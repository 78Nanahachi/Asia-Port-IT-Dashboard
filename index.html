<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Port IT News Data Monitor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root { --bg: #0a0a0c; --card: #16161a; --accent: #00e5ff; --text: #e0e0e6; --border: #2d2d33; }
  body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: grid; grid-template-columns: 400px 1fr; height: 100vh; }
  
  /* 左側：タイムライン（事実の列挙） */
  #timeline { background: var(--card); border-right: 1px solid var(--border); overflow-y: auto; padding: 20px; }
  .news-card { padding: 15px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
  .news-date { font-size: 0.75rem; color: var(--accent); }
  .news-title { display: block; font-weight: bold; text-decoration: none; color: var(--text); margin: 5px 0; font-size: 0.95rem; line-height: 1.4; }
  .news-title:hover { text-decoration: underline; }
  .news-meta { font-size: 0.7rem; color: #888; }

  /* 右側：マップとデータ解説 */
  main { display: flex; flex-direction: column; overflow: hidden; }
  #map { flex: 1; background: #000; }
  #data-analysis { height: 300px; padding: 25px; background: var(--card); border-top: 1px solid var(--border); overflow-y: auto; }
  
  .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .stat-box { border-left: 3px solid var(--accent); padding-left: 15px; }
  h3 { font-size: 0.9rem; color: var(--accent); margin: 0 0 10px 0; text-transform: uppercase; }
  p { font-size: 0.85rem; line-height: 1.6; margin: 0; color: #bbb; }
</style>
</head>
<body>

<div id="timeline">
  <h2 style="font-size: 1.1rem; border-bottom: 2px solid var(--accent); padding-bottom: 10px;">Critical News Timeline</h2>
  <div id="feedContents"></div>
</div>

<main>
  <div id="map"></div>
  <div id="data-analysis">
    <div class="analysis-grid">
      <div class="stat-box">
        <h3>検索ヒット数の傾向（データ分布の事実）</h3>
        <p id="trend-fact">分析中...</p>
      </div>
      <div class="stat-box">
        <h3>データの限界とバイアスについて</h3>
        <p>この情報は「特定のキーワード」によるWeb検索に基づいています。ニュースの過多は、実際の港湾能力ではなく、その国やメディアの「情報発信の活発さ」を反映している点に留意が必要です。</p>
      </div>
    </div>
  </div>
</main>

<script>
const SPREADSHEET_ID = '1jGre5314DttRSk2_xXVlFc0XxgroxKJMOVonhSTaLu0';

async function init() {
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=0`;
  try {
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf("(") + 1, text.lastIndexOf(")")));
    const rows = json.table.rows;

    const data = rows.map(r => ({
      date: r.c[0]?.f || r.c[0]?.v,
      location: r.c[1]?.v || "Unknown",
      lat: parseFloat(r.c[2]?.v),
      lng: parseFloat(r.c[3]?.v),
      title: r.c[4]?.v || "No Title",
      category: r.c[6]?.v || "",
      link: r.c[7]?.v || "#"
    })).filter(d => d.title !== "No Title");

    // 日付順にソート
    data.sort((a, b) => new Date(b.date) - new Date(a.date));

    renderUI(data);
  } catch (e) {
    console.error(e);
  }
}

function renderUI(data) {
  const feed = document.getElementById('feedContents');
  const counts = { vietnam: 0, japan: 0, philippines: 0, malaysia: 0, others: 0 };

  data.forEach(d => {
    // タイムラインの描画
    const card = document.createElement('div');
    card.className = 'news-card';
    card.innerHTML = `
      <div class="news-date">${d.date}</div>
      <a href="${d.link}" target="_blank" class="news-title">${d.title}</a>
      <div class="news-meta">${d.location} | Category: ${d.category.substring(0, 50)}...</div>
    `;
    feed.appendChild(card);

    // 国別カウント（インサイトの根拠）
    const loc = d.location.toLowerCase();
    if(loc.includes("vietnam")) counts.vietnam++;
    else if(loc.includes("japan")) counts.japan++;
    else if(loc.includes("philippines")) counts.philippines++;
    else if(loc.includes("malaysia")) counts.malaysia++;
    else counts.others++;
  });

  // マップの描画（緯度経度がある場合のみ）
  const map = L.map('map').setView([15, 110], 4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
  data.forEach(d => {
    if(!isNaN(d.lat) && !isNaN(d.lng)) {
      L.marker([d.lat, d.lng]).addTo(map).bindPopup(`<b>${d.location}</b><br>${d.title}`);
    }
  });

  // 事実に基づく分析表示
  document.getElementById('trend-fact').innerHTML = `
    全${data.length}件のインシデント中、ベトナム関連が${counts.vietnam}件、日本が${counts.japan}件です。
    特に自動化(DX)関連の検索語が特定の時期に集中しており、これがメディア上での「トレンド」を形成しています。
  `;
}

init();
</script>
</body>
</html>
